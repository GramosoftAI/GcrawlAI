<div class="agent-card">
  <h2>Job Status Tracker</h2>
  <p class="card-subtitle">Track an active agent job. Polling refreshes every 3 seconds.</p>

  <div class="row">
    <input [(ngModel)]="jobIdInput" placeholder="Enter job id" />
    <button (click)="startTracking()">Track</button>
    <button class="secondary" (click)="cancelJob()">Cancel</button>
  </div>

  <div class="status-panel" *ngIf="status">
    <div class="status-row">
      <span>Status</span>
      <strong>{{ status.status }}</strong>
    </div>
    <div class="status-row">
      <span>Model</span>
      <strong>{{ status.model || 'default' }}</strong>
    </div>
    <div class="status-row">
      <span>Credits Used</span>
      <strong>{{ status.creditsUsed }}</strong>
    </div>
    <div class="status-row" *ngIf="status.expiresAt">
      <span>Expires At</span>
      <strong>{{ status.expiresAt }}</strong>
    </div>
    <div class="status-row error" *ngIf="status.error">
      <span>Error</span>
      <strong>{{ status.error }}</strong>
    </div>
  </div>
</div>
