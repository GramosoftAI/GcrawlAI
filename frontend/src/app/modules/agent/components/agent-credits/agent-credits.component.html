<div class="agent-card">
  <h2>Credit Usage</h2>
  <p class="card-subtitle">Monitor credit consumption relative to your maxCredits cap.</p>

  <div class="credit-metric">
    <div class="credit-value">{{ creditsUsed }}</div>
    <div class="credit-label">Credits Used</div>
  </div>

  <div class="credit-bar">
    <div class="credit-bar__fill" [style.width.%]="usagePercent"></div>
  </div>
  <div class="credit-footnote">
    Max Credits: {{ maxCredits || 'Not set' }} · Usage {{ usagePercent }}%
  </div>
</div>
