<div class="agent-card">
  <h2>Result Viewer</h2>
  <p class="card-subtitle">Structured output from the most recent job status poll.</p>

  <div *ngIf="status?.data; else emptyState">
    <pre>{{ formatJson(status?.data) }}</pre>
  </div>

  <ng-template #emptyState>
    <p class="empty">No results available yet. Run a job or wait for completion.</p>
  </ng-template>
</div>
