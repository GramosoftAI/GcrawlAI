<section class="auth-layout">
  <div class="analytics-bg">
    <div class="overlay"></div>
    <div class="column col-json">
      <div class="crawl-wrapper speed-slow">
        <pre *ngFor="let i of [1, 2, 3]">{{ '{' }} "auth": "forgot_password", "security": "high" {{ '}' }}</pre>
      </div>
    </div>
    <div class="column col-md">
      <div class="crawl-wrapper speed-medium">
        <div class="md-block">
          <h3>## FORGOT_PASSWORD_REQUEST</h3>
          <p>> INITIATING_RESET_FLOW...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <h2 class="brand"><span>Forgot Password</span></h2>
        <p class="text-muted small">Enter your email to receive a reset link</p>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="forgotPasswordSubmit()">
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input
            placeholder="example123@gmail.com"
            type="email"
            formControlName="email"
            class="form-control"
          />
          <div class="text-danger" *ngIf="forgotForm.get('email')?.touched">
            <small *ngIf="forgotForm.get('email')?.errors?.['required']">
              Email is required
            </small>
            <small *ngIf="forgotForm.get('email')?.errors?.['email']">
              Invalid email format
            </small>
          </div>
        </div>

        <button
          class="btn btn-orange w-100"
          type="submit"
          [disabled]="isLoading || forgotForm.invalid"
        >
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading">Sending...</span>
        </button>

        <p class="text-center mt-3">
          <a routerLink="/auth/signin">Back to Login</a>
        </p>
      </form>
    </div>
  </div>
</section>
